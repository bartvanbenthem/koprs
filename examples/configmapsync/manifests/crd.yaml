# deploy/crd.yaml
#
# CustomResourceDefinition for ConfigMapSync.
# Apply with: kubectl apply -f deploy/crd.yaml
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: configmapsyncs.example.io
spec:
  group: example.io
  names:
    kind: ConfigMapSync
    listKind: ConfigMapSyncList
    plural: configmapsyncs
    singular: configmapsync
    shortNames:
      - cms
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Target
          type: string
          jsonPath: .spec.targetNamespace
        - name: Ready
          type: string
          jsonPath: .status.ready
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [targetNamespace, data]
              properties:
                targetNamespace:
                  type: string
                  description: Namespace where the ConfigMap will be created.
                data:
                  type: object
                  additionalProperties:
                    type: string
                  description: Key/value pairs to place in the ConfigMap.
            status:
              type: object
              properties:
                ready:
                  type: boolean
                message:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status, reason, message, lastTransitionTime]
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum: ["True", "False", "Unknown"]
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      observedGeneration:
                        type: integer
                        format: int64
