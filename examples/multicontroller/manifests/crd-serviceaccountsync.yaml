# manifests/crd-serviceaccountsync.yaml
#
# CustomResourceDefinition for ServiceAccountSync.
# Apply with: kubectl apply -f manifests/crd-serviceaccountsync.yaml
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: serviceaccountsyncs.example.io
spec:
  group: example.io
  names:
    kind: ServiceAccountSync
    listKind: ServiceAccountSyncList
    plural: serviceaccountsyncs
    singular: serviceaccountsync
    shortNames:
      - sasy
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Target
          type: string
          jsonPath: .spec.targetNamespace
        - name: Ready
          type: string
          jsonPath: .status.ready
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [targetNamespace]
              properties:
                targetNamespace:
                  type: string
                  description: Namespace where the ServiceAccount will be created.
                automountToken:
                  type: boolean
                  description: Whether pods using this ServiceAccount automount its token.
                imagePullSecrets:
                  type: array
                  items:
                    type: string
                  description: Names of image-pull secrets to attach to the ServiceAccount.
            status:
              type: object
              properties:
                ready:
                  type: boolean
                message:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status, reason, message, lastTransitionTime]
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum: ["True", "False", "Unknown"]
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      observedGeneration:
                        type: integer
                        format: int64
