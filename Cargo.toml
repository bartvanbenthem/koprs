[package]
name = "kube-genops"
version = "0.3.0"
edition = "2024"
description = "Generic Kubernetes resource operations for Rust operators"
license = "MIT"

[lib]
name = "kube_genops"
path = "src/lib.rs"

[dependencies]
thiserror = "1"
futures = "0.3"
k8s-openapi = { version = "0.25.0", default-features = false, features = ["v1_33"] }
kube = { version = "1.1.0", default-features = true, features = ["derive", "runtime"] }
kube-runtime = "1.1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["macros", "rt-multi-thread", "fs"] }
tracing = "0.1.36"
http-body-util = "0.1.3"

[dev-dependencies]
tokio = { version = "1.0", features = ["macros", "rt-multi-thread", "test-util"] }
tracing-subscriber = "0.3.3"
tower-test = "0.4"
tempfile   = "3"
http       = "1"

[features]
integration = []
