[workspace]
members = ["crates/*"]
resolver = "2"

[workspace.package]
version = "0.5.4"
edition = "2024"
license = "MIT"
repository = "https://github.com/bartvanbenthem/operator-sdk-rs"
description = "SDK for building Kubernetes applications in Rust. Provides high level APIs, useful abstractions, and project scaffolding."

[workspace.dependencies]
kube = { version = "0.95", features = ["runtime", "derive"] }
kube-runtime = "0.95"
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
schemars = "0.8"
syn = { version = "2", features = ["full"] }
quote = "1"
proc-macro2 = "1"
inventory = "0.3"