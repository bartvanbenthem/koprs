[workspace]
members = ["crates/*"]
resolver = "2"

[workspace.package]
version = "0.3.7"
edition = "2024"
license = "Apache-2.0"
repository = "https://github.com/bartvanbenthem/kube-genops"

[workspace.dependencies]
kube = { version = "0.95", features = ["runtime", "derive"] }
kube-runtime = "0.95"
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
schemars = "0.8"
syn = { version = "2", features = ["full"] }
quote = "1"
proc-macro2 = "1"
inventory = "0.3"